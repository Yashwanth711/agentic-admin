<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">

  <!-- Login -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-gray-900 rounded-2xl p-6 sm:p-8 border border-gray-800 w-full max-w-sm shadow-2xl">
      <div class="text-center mb-6">
        <div class="text-4xl mb-2">🛍️</div>
        <h1 class="text-2xl font-bold text-white">Agentic Admin</h1>
        <p class="text-gray-500 text-sm mt-1">Login to view chat sessions</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-gray-500 block mb-1">Username</label>
          <input id="username" type="text" placeholder="admin"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500" />
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Password</label>
          <input id="password" type="password" placeholder="Enter password"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500" />
        </div>
        <p id="login-error" class="text-red-400 text-xs hidden">Invalid credentials</p>
        <button id="login-btn"
          class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl hover:bg-amber-400 transition-colors">
          Login
        </button>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <header class="bg-gray-900 border-b border-gray-800 px-4 sm:px-6 py-4">
      <div class="flex flex-wrap items-center justify-between gap-3 max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🛍️</span>
          <div>
            <h1 class="text-xl font-bold text-white">Agentic Admin</h1>
            <p class="text-xs text-gray-500">Live Session Dashboard</p>
          </div>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
          <label class="flex items-center gap-2 text-sm text-gray-400">
            <input type="checkbox" id="auto-refresh" checked class="rounded accent-amber-500" />
            Auto-refresh
          </label>
          <button id="refresh-btn" class="text-sm bg-gray-800 text-gray-300 px-4 py-2 rounded-lg hover:bg-gray-700">Refresh</button>
          <a href="https://docs.google.com/spreadsheets/d/1oKRqcEZGt2E53RTKs5EnxtxnYhdI7cMZ9FZ_ivMJc9c/edit"
            target="_blank" class="text-sm bg-green-800 text-green-300 px-4 py-2 rounded-lg hover:bg-green-700">Sheet</a>
          <button id="logout-btn" class="text-sm text-gray-500 hover:text-gray-300">Logout</button>
        </div>
      </div>
    </header>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
      <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8"></div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-1">
          <h2 class="text-sm font-semibold text-gray-400 uppercase mb-3">Sessions</h2>
          <div id="sessions-list" class="space-y-2 max-h-[70vh] overflow-y-auto"></div>
        </div>
        <div class="lg:col-span-2">
          <h2 class="text-sm font-semibold text-gray-400 uppercase mb-3" id="transcript-title">Select a session</h2>
          <div id="transcript" class="bg-gray-900 rounded-xl border border-gray-800 p-4 max-h-[70vh] overflow-y-auto">
            <p class="text-gray-600 text-sm text-center py-16">Click a session to view conversation</p>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(function() {
  var GSHEET_URL = "https://script.google.com/macros/s/AKfycbxd1mug0pGQJeeoNtrD_MIBE3x4oA3Gk4C2l9neZvfbC7yzaaKHesNZt-6-hKgYoHn2Cw/exec";
  var ANALYZE_URL = "https://agentic-shopping.vercel.app/api/analyze";
  var ADMIN_USER = "admin";
  var ADMIN_PASS = "saheli2026";
  var refreshInterval = null;
  var sessionsData = [];
  var selectedSessionId = null;
  var LANGS = {"en":"English","hi":"Hindi","te":"Telugu","ta":"Tamil","kn":"Kannada","ml":"Malayalam","bn":"Bengali","mr":"Marathi","gu":"Gujarati","pa":"Punjabi","or":"Odia","ur":"Urdu"};

  function esc(t) { var d = document.createElement("div"); d.textContent = t || ""; return d.innerHTML; }

  function timeAgo(ts) {
    var d = Date.now() - new Date(ts).getTime();
    if (d < 60000) return "just now";
    if (d < 3600000) return Math.floor(d/60000) + "m ago";
    if (d < 86400000) return Math.floor(d/3600000) + "h ago";
    return Math.floor(d/86400000) + "d ago";
  }

  // Login
  document.getElementById("login-btn").onclick = function() {
    var u = document.getElementById("username").value.trim();
    var p = document.getElementById("password").value.trim();
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      try { localStorage.setItem("saheli_admin", "true"); } catch(e) {}
      showDashboard();
    } else {
      var err = document.getElementById("login-error");
      err.classList.remove("hidden");
      setTimeout(function() { err.classList.add("hidden"); }, 3000);
    }
  };

  document.getElementById("password").onkeydown = function(e) {
    if (e.key === "Enter") document.getElementById("login-btn").click();
  };

  document.getElementById("logout-btn").onclick = function() {
    try { localStorage.removeItem("saheli_admin"); } catch(e) {}
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("login-screen").classList.remove("hidden");
  };

  document.getElementById("refresh-btn").onclick = function() { fetchData(); };

  document.getElementById("auto-refresh").onchange = function() {
    if (this.checked) startRefresh(); else stopRefresh();
  };

  function showDashboard() {
    document.getElementById("login-screen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    fetchData();
    startRefresh();
  }

  function startRefresh() { stopRefresh(); refreshInterval = setInterval(fetchData, 10000); }
  function stopRefresh() { if (refreshInterval) { clearInterval(refreshInterval); refreshInterval = null; } }

  function fetchData() {
    fetch(GSHEET_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        sessionsData = data.sessions || [];
        renderStats(data.stats || {});
        renderSessions();
        if (selectedSessionId) renderTranscript(selectedSessionId);
      })
      .catch(function(e) { console.error("Fetch error:", e); });
  }

  function renderStats(s) {
    var langHtml = "";
    var lb = s.languageBreakdown || {};
    for (var k in lb) {
      langHtml += '<span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded">' + (LANGS[k]||k) + ": " + lb[k] + "</span> ";
    }
    if (!langHtml) langHtml = '<span class="text-xs text-gray-600">No data</span>';

    var satColor = (s.satisfactionRate || 0) >= 70 ? "text-green-400" : "text-red-400";

    document.getElementById("stats-grid").innerHTML =
      '<div class="bg-gray-900 rounded-xl p-4 border border-gray-800"><p class="text-3xl font-bold text-white">' + (s.totalSessions||0) + '</p><p class="text-xs text-gray-500 mt-1">Total Sessions</p></div>' +
      '<div class="bg-gray-900 rounded-xl p-4 border border-gray-800"><p class="text-3xl font-bold text-green-400">' + (s.activeSessions||0) + '</p><p class="text-xs text-gray-500 mt-1">Active Now</p></div>' +
      '<div class="bg-gray-900 rounded-xl p-4 border border-gray-800"><p class="text-3xl font-bold text-amber-400">' + (s.totalMessages||0) + '</p><p class="text-xs text-gray-500 mt-1">Total Messages</p></div>' +
      '<div class="bg-gray-900 rounded-xl p-4 border border-gray-800"><p class="text-3xl font-bold text-purple-400">' + (s.avgMessagesPerSession||0) + '</p><p class="text-xs text-gray-500 mt-1">Avg Msgs/Session</p></div>' +
      '<div class="bg-gray-900 rounded-xl p-4 border border-gray-800"><div class="flex items-center gap-2 mb-1"><span class="text-lg">👍 ' + (s.totalLikes||0) + '</span><span class="text-lg">👎 ' + (s.totalDislikes||0) + '</span></div><p class="text-xs text-gray-500">Satisfaction: <span class="' + satColor + '">' + (s.satisfactionRate||0) + '%</span></p></div>';
  }

  function renderSessions() {
    var el = document.getElementById("sessions-list");
    if (sessionsData.length === 0) {
      el.innerHTML = '<div class="text-center py-12"><p class="text-4xl mb-3">💬</p><p class="text-gray-500 text-sm">No sessions yet</p></div>';
      return;
    }
    var html = "";
    for (var i = 0; i < sessionsData.length; i++) {
      var s = sessionsData[i];
      var isActive = Date.now() - new Date(s.lastActiveAt).getTime() < 300000;
      var last = s.messages[s.messages.length - 1];
      var sel = selectedSessionId === s.id;
      var dotClass = isActive ? "bg-green-400 animate-pulse" : "bg-gray-600";
      var borderClass = sel ? "bg-amber-500/10 border-amber-500/50" : "bg-gray-900 border-gray-800 hover:border-gray-700";

      html += '<button data-sid="' + s.id + '" class="session-btn w-full text-left p-3 rounded-xl border transition-all ' + borderClass + '">';
      html += '<div class="flex items-center justify-between mb-1"><div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ' + dotClass + '"></span><span class="text-xs font-mono text-gray-500">' + s.id.slice(0,14) + '</span></div><span class="text-xs text-gray-600">' + timeAgo(s.lastActiveAt) + '</span></div>';
      html += '<div class="flex items-center gap-2 mb-1"><span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded">' + (LANGS[s.language]||s.language) + '</span><span class="text-xs text-gray-600">' + s.messages.length + ' msgs</span></div>';
      if (last) html += '<p class="text-xs text-gray-500 truncate">' + (last.role === "user" ? "👤 " : "🤖 ") + esc(last.content).slice(0,60) + '</p>';
      html += '</button>';
    }
    el.innerHTML = html;

    // Attach click handlers
    var btns = el.querySelectorAll(".session-btn");
    for (var j = 0; j < btns.length; j++) {
      btns[j].onclick = function() {
        selectedSessionId = this.getAttribute("data-sid");
        renderSessions();
        renderTranscript(selectedSessionId);
      };
    }
  }

  function renderTranscript(id) {
    var session = null;
    for (var i = 0; i < sessionsData.length; i++) {
      if (sessionsData[i].id === id) { session = sessionsData[i]; break; }
    }
    if (!session) return;

    document.getElementById("transcript-title").textContent = "Conversation — " + id.slice(0,14);

    var html = '<div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-800">';
    html += '<div class="flex items-center gap-2 text-xs text-gray-600">';
    html += '<span>Started: ' + new Date(session.startedAt).toLocaleString() + '</span><span>|</span>';
    html += '<span>' + (LANGS[session.language]||session.language) + '</span><span>|</span>';
    html += '<span>' + session.messages.length + ' msgs</span></div>';
    html += '<button id="analyze-btn" class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-500">Analyze</button>';
    html += '</div><div id="analysis-result"></div>';

    for (var i = 0; i < session.messages.length; i++) {
      var m = session.messages[i];
      if (m.role === "user") {
        html += '<div class="flex justify-end mb-3"><div class="max-w-[80%] rounded-2xl px-4 py-2.5 text-sm bg-amber-500/20 text-amber-200 rounded-br-sm">';
        html += '<div class="flex items-center gap-2 mb-1"><span class="text-xs font-medium">👤 Customer</span><span class="text-xs text-gray-600">' + new Date(m.timestamp).toLocaleTimeString() + '</span></div>';
        html += '<p class="whitespace-pre-wrap leading-relaxed">' + esc(m.content) + '</p></div></div>';
      } else {
        html += '<div class="flex justify-start mb-3"><div class="max-w-[80%] rounded-2xl px-4 py-2.5 text-sm bg-gray-800 text-gray-300 rounded-bl-sm">';
        html += '<div class="flex items-center gap-2 mb-1"><span class="text-xs font-medium">🤖 Saheli</span><span class="text-xs text-gray-600">' + new Date(m.timestamp).toLocaleTimeString() + '</span></div>';
        html += '<p class="whitespace-pre-wrap leading-relaxed">' + esc(m.content) + '</p></div></div>';
      }
    }

    document.getElementById("transcript").innerHTML = html;

    // Attach analyze button
    var analyzeBtn = document.getElementById("analyze-btn");
    if (analyzeBtn) {
      analyzeBtn.onclick = function() { analyzeSession(id); };
    }
  }

  function analyzeSession(id) {
    var session = null;
    for (var i = 0; i < sessionsData.length; i++) {
      if (sessionsData[i].id === id) { session = sessionsData[i]; break; }
    }
    if (!session) return;

    var btn = document.getElementById("analyze-btn");
    if (btn) { btn.textContent = "Analyzing..."; btn.disabled = true; }

    var convo = "";
    for (var i = 0; i < session.messages.length; i++) {
      var m = session.messages[i];
      convo += (m.role === "user" ? "Customer" : "Saheli") + ": " + m.content + "\n";
    }

    var prompt = "Analyze this shopping conversation. Give a brief seller report:\n\n" + convo +
      "\n\nRespond in this format:\nINTENT: What customer wanted (1 line)\nLIKED: What they liked (1 line)\nCONCERNS: Hesitations or doubts (1 line)\nOUTCOME: Did they buy? Why not? (1 line)\nACTION: What seller should do (1 line)\nSATISFACTION: Rate 1-5";

    fetch(ANALYZE_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ conversation: convo })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var text = data.analysis || data.error || "Analysis failed";
      var el = document.getElementById("analysis-result");
      if (el) {
        el.innerHTML = '<div class="bg-indigo-500/10 border border-indigo-500/30 rounded-xl p-4 mt-4"><h4 class="text-sm font-semibold text-indigo-400 mb-2">AI Session Analysis</h4><pre class="text-xs text-gray-300 whitespace-pre-wrap leading-relaxed">' + esc(text) + '</pre></div>';
      }
    })
    .catch(function(e) {
      var el = document.getElementById("analysis-result");
      if (el) el.innerHTML = '<p class="text-red-400 text-xs mt-2">Analysis failed</p>';
    })
    .finally(function() {
      if (btn) { btn.textContent = "Analyze"; btn.disabled = false; }
    });
  }

  // Auto-login
  try {
    if (localStorage.getItem("saheli_admin") === "true") showDashboard();
  } catch(e) {}
})();
</script>
</body>
</html>
