<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saheli Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-green { animation: pulse-green 2s infinite; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen">

  <!-- Login Screen -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 rounded-2xl p-8 border border-gray-800 w-full max-w-sm shadow-2xl">
      <div class="text-center mb-6">
        <span class="text-4xl">🛍️</span>
        <h1 class="text-2xl font-bold text-white mt-2">Saheli Admin</h1>
        <p class="text-gray-500 text-sm mt-1">Login to view chat sessions</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-gray-500 block mb-1">Username</label>
          <input id="username" type="text" placeholder="admin"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500" />
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">Password</label>
          <input id="password" type="password" placeholder="Enter password"
            class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-amber-500"
            onkeydown="if(event.key==='Enter') login()" />
        </div>
        <p id="login-error" class="text-red-400 text-xs hidden">Invalid credentials</p>
        <button onclick="login()"
          class="w-full bg-amber-500 text-black font-semibold py-3 rounded-xl hover:bg-amber-400 transition-colors">
          Login
        </button>
      </div>
    </div>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div id="dashboard" class="hidden">
    <!-- Header -->
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4">
      <div class="flex items-center justify-between max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🛍️</span>
          <div>
            <h1 class="text-xl font-bold text-white">Saheli Admin</h1>
            <p class="text-xs text-gray-500">Live Session Dashboard</p>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <label class="flex items-center gap-2 text-sm text-gray-400">
            <input type="checkbox" id="auto-refresh" checked onchange="toggleRefresh()"
              class="rounded accent-amber-500" />
            Auto-refresh
          </label>
          <button onclick="fetchData()"
            class="text-sm bg-gray-800 text-gray-300 px-4 py-2 rounded-lg hover:bg-gray-700">Refresh</button>
          <a href="https://docs.google.com/spreadsheets/d/1oKRqcEZGt2E53RTKs5EnxtxnYhdI7cMZ9FZ_ivMJc9c/edit"
            target="_blank" class="text-sm bg-green-800 text-green-300 px-4 py-2 rounded-lg hover:bg-green-700">
            Open Sheet
          </a>
          <button onclick="logout()" class="text-sm text-gray-500 hover:text-gray-300">Logout</button>
        </div>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-6">
      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="stats-grid"></div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Sessions List -->
        <div class="lg:col-span-1">
          <h2 class="text-sm font-semibold text-gray-400 uppercase mb-3">Sessions</h2>
          <div id="sessions-list" class="space-y-2 max-h-[70vh] overflow-y-auto"></div>
        </div>
        <!-- Chat Transcript -->
        <div class="lg:col-span-2">
          <h2 class="text-sm font-semibold text-gray-400 uppercase mb-3" id="transcript-title">Select a session</h2>
          <div id="transcript" class="bg-gray-900 rounded-xl border border-gray-800 p-4 max-h-[70vh] overflow-y-auto">
            <p class="text-gray-600 text-sm text-center py-16">Click on a session to view the conversation</p>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const GSHEET_URL = "https://script.google.com/macros/s/AKfycbxd1mug0pGQJeeoNtrD_MIBE3x4oA3Gk4C2l9neZvfbC7yzaaKHesNZt-6-hKgYoHn2Cw/exec";
const ADMIN_USER = "admin";
const ADMIN_PASS = "saheli2026";

let refreshInterval = null;
let sessionsData = [];
let selectedSessionId = null;

const LANG_NAMES = { en:"English", hi:"Hindi", te:"Telugu", ta:"Tamil", kn:"Kannada", ml:"Malayalam", bn:"Bengali", mr:"Marathi", gu:"Gujarati", pa:"Punjabi", or:"Odia", ur:"Urdu" };

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    localStorage.setItem("saheli_admin", "true");
    showDashboard();
  } else {
    document.getElementById("login-error").classList.remove("hidden");
  }
}

function logout() {
  localStorage.removeItem("saheli_admin");
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById("login-screen").classList.remove("hidden");
}

function showDashboard() {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  fetchData();
  startRefresh();
}

function toggleRefresh() {
  if (document.getElementById("auto-refresh").checked) startRefresh();
  else stopRefresh();
}

function startRefresh() { stopRefresh(); refreshInterval = setInterval(fetchData, 10000); }
function stopRefresh() { if (refreshInterval) clearInterval(refreshInterval); }

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 60000) return "just now";
  if (diff < 3600000) return Math.floor(diff/60000) + "m ago";
  if (diff < 86400000) return Math.floor(diff/3600000) + "h ago";
  return Math.floor(diff/86400000) + "d ago";
}

async function fetchData() {
  try {
    const res = await fetch(GSHEET_URL);
    const data = await res.json();
    sessionsData = data.sessions || [];
    renderStats(data.stats || {});
    renderSessions();
    if (selectedSessionId) renderTranscript(selectedSessionId);
  } catch(e) { console.error("Fetch error:", e); }
}

function renderStats(s) {
  const langHtml = Object.entries(s.languageBreakdown || {}).map(([l,c]) =>
    `<span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded">${LANG_NAMES[l]||l}: ${c}</span>`
  ).join("") || '<span class="text-xs text-gray-600">No data yet</span>';

  document.getElementById("stats-grid").innerHTML = `
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
      <p class="text-3xl font-bold text-white">${s.totalSessions||0}</p>
      <p class="text-xs text-gray-500 mt-1">Total Sessions</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
      <p class="text-3xl font-bold text-green-400">${s.activeSessions||0}</p>
      <p class="text-xs text-gray-500 mt-1">Active Now</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
      <p class="text-3xl font-bold text-amber-400">${s.totalMessages||0}</p>
      <p class="text-xs text-gray-500 mt-1">Total Messages</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
      <p class="text-3xl font-bold text-purple-400">${s.avgMessagesPerSession||0}</p>
      <p class="text-xs text-gray-500 mt-1">Avg Msgs/Session</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
      <p class="text-sm font-medium text-white mb-2">Languages</p>
      <div class="flex flex-wrap gap-1">${langHtml}</div>
    </div>`;
}

function renderSessions() {
  if (sessionsData.length === 0) {
    document.getElementById("sessions-list").innerHTML = `
      <div class="text-center py-12">
        <p class="text-4xl mb-3">💬</p>
        <p class="text-gray-500 text-sm">No sessions yet</p>
        <p class="text-gray-600 text-xs mt-1">Start chatting with Saheli!</p>
      </div>`;
    return;
  }

  document.getElementById("sessions-list").innerHTML = sessionsData.map(s => {
    const isActive = Date.now() - new Date(s.lastActiveAt).getTime() < 300000;
    const last = s.messages[s.messages.length - 1];
    const selected = selectedSessionId === s.id;
    return `
      <button onclick="selectSession('${s.id}')"
        class="w-full text-left p-3 rounded-xl border transition-all ${selected ? 'bg-amber-500/10 border-amber-500/50' : 'bg-gray-900 border-gray-800 hover:border-gray-700'}">
        <div class="flex items-center justify-between mb-1">
          <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full ${isActive ? 'bg-green-400 pulse-green' : 'bg-gray-600'}"></span>
            <span class="text-xs font-mono text-gray-500">${s.id.slice(0,14)}</span>
          </div>
          <span class="text-xs text-gray-600">${timeAgo(s.lastActiveAt)}</span>
        </div>
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded">${LANG_NAMES[s.language]||s.language}</span>
          <span class="text-xs text-gray-600">${s.messages.length} msgs</span>
        </div>
        ${last ? `<p class="text-xs text-gray-500 truncate">${last.role==='user'?'👤 ':'🤖 '}${last.content.slice(0,60)}</p>` : ''}
      </button>`;
  }).join("");
}

function selectSession(id) {
  selectedSessionId = id;
  renderSessions();
  renderTranscript(id);
}

function renderTranscript(id) {
  const session = sessionsData.find(s => s.id === id);
  if (!session) return;

  document.getElementById("transcript-title").textContent = `Conversation — ${id.slice(0,14)}`;
  document.getElementById("transcript").innerHTML = `
    <div class="flex items-center gap-2 text-xs text-gray-600 mb-4 pb-3 border-b border-gray-800">
      <span>Started: ${new Date(session.startedAt).toLocaleString()}</span>
      <span>|</span>
      <span>Language: ${LANG_NAMES[session.language]||session.language}</span>
      <span>|</span>
      <span>${session.messages.length} messages</span>
    </div>
    ${session.messages.map(m => `
      <div class="flex ${m.role==='user'?'justify-end':'justify-start'} mb-3">
        <div class="max-w-[80%] rounded-2xl px-4 py-2.5 text-sm ${
          m.role==='user' ? 'bg-amber-500/20 text-amber-200 rounded-br-sm' : 'bg-gray-800 text-gray-300 rounded-bl-sm'
        }">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-xs font-medium">${m.role==='user'?'👤 Customer':'🤖 Saheli'}</span>
            <span class="text-xs text-gray-600">${new Date(m.timestamp).toLocaleTimeString()}</span>
          </div>
          <p class="whitespace-pre-wrap leading-relaxed">${escapeHtml(m.content)}</p>
        </div>
      </div>
    `).join("")}`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Auto-login if previously authenticated
if (localStorage.getItem("saheli_admin") === "true") {
  showDashboard();
}
</script>
</body>
</html>
